name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package extension
        run: |
          mkdir -p dist/bilibili-edu-tag
          cp manifest.json content.js styles.css popup.html popup.js dist/bilibili-edu-tag/
          cp -r icons dist/bilibili-edu-tag/
          cd dist && zip -r ../bilibili-edu-tag-${{ steps.version.outputs.VERSION }}.zip bilibili-edu-tag

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bilibili-edu-tag-*.zip
          generate_release_notes: true
          name: "Release ${{ steps.version.outputs.VERSION }}"
name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package extension
        run: |
          mkdir -p dist/bilibili-edu-tag
          cp manifest.json content.js styles.css popup.html popup.js dist/bilibili-edu-tag/
          cp -r icons dist/bilibili-edu-tag/
          cd dist && zip -r ../bilibili-edu-tag-${{ steps.version.outputs.VERSION }}.zip bilibili-edu-tag

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bilibili-edu-tag-*.zip
          name: " ${{ steps.version.outputs.VERSION }}"
          body: |
            ##  B站评论学历标签 ${{ steps.version.outputs.VERSION }}

            在 B 站视频评论区给每位评论用户的头像旁随机注入一个学历标签，分布参考中国第七次人口普查数据。**仅供娱乐**。

            ###  安装方法

            1. 下载下方 `bilibili-edu-tag-${{ steps.version.outputs.VERSION }}.zip` 并解压
            2. 打开 Edge / Chrome，地址栏输入 `edge://extensions/` 或 `chrome://extensions/`
            3. 打开右上角 **"开发人员模式"**
            4. 点 **"加载解压缩的扩展"**，选择解压后的文件夹
            5. 打开任意 B 站视频页，滚动到评论区即可


            ###  免责声明

            所有标签均为程序生成的伪随机结果，**不代表任何真实信息**，请勿据此对他人做出现实判断。

            ---

            **完整变更记录**: https://github.com/pjymyth/bilibili-edu-tag/commits/${{ steps.version.outputs.VERSION }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>B站评论学历标签 & 额外倍速</title>
  <style>
    body {
      width: 300px;
      margin: 0;
      padding: 12px 14px;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
      color: #222;
      background: #fafafa;
    }
    h3 {
      margin: 0 0 6px;
      font-size: 14px;
      color: #00a1d6;
    }
    .section {
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }
    .section:last-child { border: none; }
    .desc {
      color: #666;
      font-size: 12px;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
    }
    .tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 8px;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
    }
    .pct {
      color: #888;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .speed-list {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px;
    }
    .speed-pill {
      display: inline-block;
      padding: 2px 8px;
      background: #00a1d6;
      color: #fff;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .hotkey {
      font-family: Consolas, Monaco, monospace;
      background: #eee;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
    }
    .footer {
      margin-top: 8px;
      font-size: 11px;
      color: #999;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="section">
    <h3>📚 评论区学历标签</h3>
    <div class="desc">在评论区头像后随机注入学历标签。分布参考第七次人口普查数据，仅供娱乐。</div>
    <div id="edu-list"></div>
  </div>

  <div class="section">
    <h3>⚡ 播放器额外倍速</h3>
    <div class="desc">在B站倍速菜单中追加更多选项：</div>
    <div class="speed-list" id="speed-list"></div>
    <div class="desc" style="margin-top: 8px;">
      快捷键（<span class="hotkey">Alt</span> + 数字）：<br>
      <span class="hotkey">Alt+1</span> 1x &nbsp;
      <span class="hotkey">Alt+2</span> 2x &nbsp;
      <span class="hotkey">Alt+3</span> 3x<br>
      <span class="hotkey">Alt+4</span> 4x &nbsp;
      <span class="hotkey">Alt+5</span> 5x &nbsp;
      <span class="hotkey">Alt+6</span> 3.5x<br>
      <span class="hotkey">Alt+0</span> 10x
    </div>
  </div>

  <div class="footer">
    · 完全本地运行，不收集任何数据<br>
    · 同一用户标签固定（基于UID哈希）<br>
    · 标签为程序随机生成，与现实无关
  </div>

  <script src="popup.js"></script>
</body>
</html>
